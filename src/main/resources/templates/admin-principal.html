<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Principal Management</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(to right,#1d2671,#c33764);
            display:flex;
            flex-direction:column;
        }

        .header{
            background: linear-gradient(to right,#2563eb,#7c3aed);
            color:white;
            text-align:center;
            padding:30px;
        }

        .card{
            width:95%;
            max-width:1100px;
            margin:30px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            flex:1;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .btn{
            padding:7px 14px;
            color:white;
            text-decoration:none;
            border-radius:5px;
            font-size:13px;
            transition:.3s;
        }

        .back{background:#1d2671;}
        .add{background:#0284c7;}
        .edit{background:#f59e0b;}
        .approve{background:#16a34a;}
        .delete{background:#dc2626;}

        h2{
            text-align:center;
            margin:22px 0;
            color:#1d2671;
        }

        .form-box{
            background:#f8fafc;
            padding:20px;
            border-radius:10px;
            margin-bottom:25px;
        }

        form{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }

        label{
            font-weight:600;
            font-size:14px;
        }

        input,select{
            width:100%;
            padding:9px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        .full{
            grid-column:span 2;
        }

        button{
            grid-column:span 2;
            background:#16a34a;
            color:white;
            border:none;
            padding:11px;
            border-radius:6px;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#1f2933;
            color:white;
            padding:10px;
        }

        td{
            padding:9px;
            border:1px solid #ddd;
            text-align:center;
            font-size:14px;
        }

        tr:nth-child(even){
            background:#f1f5f9;
        }

        .action-cell{
            display:flex;
            justify-content:center;
            gap:8px;
            flex-wrap:wrap;
        }

        footer{
            background:#020617;
            color:white;
            text-align:center;
            padding:12px;
            font-size:14px;
        }

        .error-msg{
            color:red;
            font-size:12px;
            margin-top:4px;
        }

        @media(max-width:700px){
            form{ grid-template-columns:1fr; }
            .full{ grid-column:1; }
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Cauvery Polytechnic Gonikoppal</h1>
    <h3>Online Diploma Question Paper Download System</h3>
    <p>Principal Management</p>
</div>

<div class="card">

    <div class="top-bar">
        <a href="/admin/dashboard" class="btn back">← Dashboard</a>
        <a href="/admin/principal" class="btn add">
            <i class="fa-solid fa-plus"></i> New Principal
        </a>
    </div>

    <h2 th:text="${editMode} ? 'Edit Principal' : 'Add Principal'"></h2>

    <div class="form-box">
        <form th:action="${editMode} ? @{/admin/principal/update} : @{/admin/principal/save}"
              th:object="${principal}" method="post" id="principalForm">

            <div>
                <label>Principal Code</label>
                <input type="text"
                       id="principalCode"
                       th:field="*{principalCode}"
                       th:readonly="${editMode}"
                       oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                       required>
                <div class="error-msg" id="codeError"></div>
            </div>

            <div>
                <label>Name</label>
                <input type="text"
                       id="principalName"
                       th:field="*{principalName}"
                       oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')"
                       required>
                <div class="error-msg" id="nameError"></div>
            </div>

            <div>
                <label>Mobile</label>
                <input type="text"
                       id="principalMobile"
                       th:field="*{mobile}"
                       maxlength="10"
                       oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                       required>
                <div class="error-msg" id="mobileError"></div>
            </div>

            <!-- ✅ EMAIL FIELD (NEW) -->
            <div>
                <label>Email</label>
                <input type="email"
                       id="principalEmail"
                       th:field="*{email}"
                       required>
                <div class="error-msg" id="emailError"></div>
            </div>

            <div class="full">
                <label>College</label>
                <select id="principalCollege" th:field="*{collegeCode}" required>
                    <option value="">-- Select College --</option>
                    <option th:each="c:${colleges}"
                            th:value="${c.collegeCode}"
                            th:text="${c.collegeCode}">
                    </option>
                </select>
                <div class="error-msg" id="collegeError"></div>
            </div>

            <button type="submit"
                    th:text="${editMode} ? 'Update Principal' : 'Save Principal'">
            </button>

        </form>
    </div>

    <h2>Principal List</h2>

    <table>
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Mobile</th>
            <th>Email</th> <!-- ✅ NEW COLUMN -->
            <th>College</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        <tr th:each="p:${principals}">
            <td th:text="${p.principalCode}"></td>
            <td th:text="${p.principalName}"></td>
            <td th:text="${p.mobile}"></td>
            <td th:text="${p.email}"></td> <!-- ✅ NEW -->
            <td th:text="${p.collegeCode}"></td>
            <td th:text="${p.status}"></td>

            <td class="action-cell">
                <a class="btn edit"
                   th:href="@{/admin/principal/edit/{id}(id=${p.principalCode})}">
                    Edit
                </a>

                <a th:if="${p.status=='PENDING'}"
                   class="btn approve"
                   th:href="@{/admin/principal/approve/{id}(id=${p.principalCode})}">
                    Approve
                </a>

                <a class="btn delete"
                   th:href="@{/admin/principal/delete/{id}(id=${p.principalCode})}"
                   onclick="return confirm('Delete this principal?')">
                    Delete
                </a>
            </td>
        </tr>
    </table>
</div>

<footer>
    Developed And Designed By Jeevan V E, Arjun R, Vivek C R, Nithya N P, Krish K D | 2026
</footer>

<script>
    document.getElementById("principalForm").addEventListener("submit", function(e){

        let valid = true;

        const code    = document.getElementById("principalCode").value.trim();
        const name    = document.getElementById("principalName").value.trim();
        const mobile  = document.getElementById("principalMobile").value.trim();
        const email   = document.getElementById("principalEmail").value.trim(); // ✅ NEW
        const college = document.getElementById("principalCollege").value;

        document.getElementById("codeError").innerText = "";
        document.getElementById("nameError").innerText = "";
        document.getElementById("mobileError").innerText = "";
        document.getElementById("emailError").innerText = ""; // ✅ NEW
        document.getElementById("collegeError").innerText = "";

        if(!/^[0-9]+$/.test(code)){
            document.getElementById("codeError").innerText =
                "Code must contain numbers only";
            valid = false;
        }

        if(!/^[A-Za-z ]+$/.test(name)){
            document.getElementById("nameError").innerText =
                "Name must contain letters only";
            valid = false;
        }

        if(!/^[0-9]{10}$/.test(mobile)){
            document.getElementById("mobileError").innerText =
                "Mobile must be exactly 10 digits";
            valid = false;
        }

        if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
            document.getElementById("emailError").innerText =
                "Enter valid email address";
            valid = false;
        }

        if(college === ""){
            document.getElementById("collegeError").innerText =
                "Please select a college";
            valid = false;
        }

        if(!valid) e.preventDefault();
    });
</script>

</body>
</html>
