<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
            overflow:hidden;
        }

        /* Floating Background Animation */

        body::before{
            content:"";
            position:absolute;
            width:600px;
            height:600px;
            background:linear-gradient(135deg,#a855f7,#6366f1);
            border-radius:50%;
            top:-200px;
            left:-200px;
            filter:blur(120px);
            animation:float1 8s infinite ease-in-out;
        }

        body::after{
            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:linear-gradient(135deg,#22d3ee,#3b82f6);
            border-radius:50%;
            bottom:-180px;
            right:-150px;
            filter:blur(120px);
            animation:float2 10s infinite ease-in-out;
        }

        @keyframes float1{
            0%{ transform:translateY(0px); }
            50%{ transform:translateY(40px); }
            100%{ transform:translateY(0px); }
        }

        @keyframes float2{
            0%{ transform:translateY(0px); }
            50%{ transform:translateY(-40px); }
            100%{ transform:translateY(0px); }
        }

        /* Glass Card */

        .container{
            width:900px;
            height:520px;
            backdrop-filter:blur(18px);
            background:rgba(255,255,255,0.08);
            border-radius:22px;
            display:flex;
            overflow:hidden;
            box-shadow:0 25px 60px rgba(0,0,0,0.35);
            border:1px solid rgba(255,255,255,0.12);
            z-index:1;
            animation:cardEntry .8s ease;
        }

        @keyframes cardEntry{
            from{
                transform:translateY(30px) scale(.95);
                opacity:0;
            }
            to{
                transform:none;
                opacity:1;
            }
        }

        /* Left Panel */

        .left-panel{
            flex:1;
            background:linear-gradient(135deg,#6366f1,#a855f7);
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            color:white;
            padding:40px;
        }

        .left-panel h1{
            font-size:28px;
            margin-bottom:10px;
        }

        .left-panel p{
            font-size:14px;
            opacity:.9;
        }

        /* Right Panel */

        .right-panel{
            flex:1;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:320px;
            text-align:center;
        }

        .profile-icon{
            font-size:55px;
            color:#6366f1;
            margin-bottom:12px;
            animation:iconFloat 3s infinite ease-in-out;
        }

        @keyframes iconFloat{
            0%{ transform:translateY(0px); }
            50%{ transform:translateY(-6px); }
            100%{ transform:translateY(0px); }
        }

        h2{
            margin-bottom:28px;
            color:#0f172a;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:none;
            border-bottom:2px solid #e2e8f0;
            outline:none;
            font-size:14px;
            transition:.3s;
        }

        input:focus{
            border-color:#6366f1;
            transform:scale(1.02);
        }

        /* Animated Button */

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:30px;
            background:linear-gradient(135deg,#6366f1,#a855f7);
            color:white;
            font-size:15px;
            cursor:pointer;
            transition:.3s;
            margin-top:10px;
            position:relative;
            overflow:hidden;
        }

        button:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(99,102,241,0.35);
        }

        button::after{
            content:"";
            position:absolute;
            width:120%;
            height:120%;
            background:rgba(255,255,255,0.25);
            top:-100%;
            left:-100%;
            transition:.5s;
        }

        button:hover::after{
            top:0;
            left:0;
        }

        .error{
            color:red;
            font-size:13px;
            margin-bottom:10px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="left-panel">
        <h1>Welcome Admin 👋</h1>
        <p>Online Diploma Question Paper Download System</p>
    </div>

    <div class="right-panel">

        <div class="login-box">

            <div class="profile-icon">
                <i class="fa-solid fa-circle-user"></i>
            </div>

            <h2>Admin Login</h2>

            <p class="error" th:text="${error}"></p>

            <form action="/admin/login" method="post">

                <input type="text" name="username" placeholder="Email Address" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>

            </form>

            <p class="error" th:if="${param.error}">
                Invalid Email or Password
            </p>

        </div>

    </div>

</div>

</body>
</html>
