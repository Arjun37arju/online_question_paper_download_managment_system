<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Principal Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#eef2f7;
        }

        /* ===== Main Container ===== */
        .container{
            width:900px;
            height:520px;
            background:white;
            border-radius:22px;
            box-shadow:0 25px 60px rgba(0,0,0,0.12);
            display:flex;
            overflow:hidden;
            animation:fadeUp .5s ease;
        }

        @keyframes fadeUp{
            from{opacity:0; transform:translateY(20px);}
            to{opacity:1; transform:translateY(0);}
        }

        /* ===== Left Panel ===== */
        .left{
            flex:1;
            background:#3b82f6;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px;
            text-align:center;
        }

        .left h1{
            font-size:32px;
            margin-bottom:10px;
        }

        .left p{
            font-size:14px;
            opacity:.9;
            margin-bottom:30px;
        }

        .left .label{
            border:1px solid rgba(255,255,255,.5);
            padding:10px 22px;
            border-radius:20px;
            font-size:13px;
        }

        /* ===== Right Panel ===== */
        .right{
            flex:1;
            display:flex;
            flex-direction:column;
            justify-content:center;
            padding:60px;
        }

        .right h2{
            font-size:26px;
            margin-bottom:25px;
            color:#0f172a;
        }

        input{
            width:100%;
            padding:13px;
            margin-bottom:16px;
            border:1.5px solid #e5e7eb;
            border-radius:10px;
            font-size:14px;
            transition:.25s;
        }

        input:focus{
            outline:none;
            border-color:#3b82f6;
            box-shadow:0 0 0 3px rgba(59,130,246,.15);
        }

        input[readonly]{
            background:#f1f5f9;
            letter-spacing:3px;
            cursor:not-allowed;
        }

        button{
            width:100%;
            padding:13px;
            background:#3b82f6;
            color:white;
            border:none;
            border-radius:10px;
            font-size:15px;
            cursor:pointer;
            transition:.25s;
        }

        button:hover{
            background:#2563eb;
        }

        .error{
            color:#dc2626;
            font-size:13px;
            margin-bottom:10px;
            min-height:18px;
        }

        .note{
            margin-top:14px;
            font-size:12px;
            color:#64748b;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>Hello, Welcome!</h1>
        <p>Online Diploma Question Paper Download System</p>
        <div class="label">Board of Technical Examination</div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <h2>Principal Login</h2>

        <div class="error" th:text="${error}"></div>

        <form action="/principal/login" method="post">

            <input type="text"
                   name="principalCode"
                   placeholder="Enter Principal Code"
                   required>

            <!-- UI Only Password -->
            <input type="password"
                   value="••••••"
                   readonly>

            <button type="submit">Login</button>

        </form>

        <div class="note">
            Password is auto-generated by Admin
        </div>

    </div>

</div>

</body>
</html>
