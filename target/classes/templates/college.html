<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>College Management</title>

    <style>
        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:"Roboto", Arial, sans-serif;
        }

        body{
        min-height:100vh;
        background:linear-gradient(to right,#1d2671,#c33764);
        display:flex;
        flex-direction:column;
        }

        .header{
        text-align:center;
        padding:30px;
        color:white;
        }

        .header h1{ font-size:42px; }
        .header h3{ font-size:24px; opacity:0.9; }
        .header p{ font-size:17px; }

        .card{
        width:1200px;
        max-width:95%;
        margin:40px auto;
        background:white;
        padding:45px;
        border-radius:14px;
        box-shadow:0 12px 30px rgba(0,0,0,0.35);
        }

        h2{
        text-align:center;
        margin-bottom:25px;
        color:#222;
        font-size:26px;
        }

        .back-btn{
        display:inline-block;
        margin-bottom:20px;
        background:#1d2671;
        color:white;
        padding:9px 18px;
        border-radius:6px;
        text-decoration:none;
        font-size:14px;
        }

        .error{
        text-align:center;
        color:red;
        margin-bottom:15px;
        font-size:15px;
        font-weight:600;
        }

        form{
        display:flex;
        flex-direction:column;
        gap:22px;
        }

        .form-group{
        display:flex;
        flex-direction:column;
        gap:6px;
        }

        label{
        font-weight:600;
        font-size:16px;
        }

        input, textarea{
        width:100%;
        padding:14px;
        border:2.5px solid #1d2671;
        border-radius:9px;
        font-size:16px;
        outline:none;
        }

        textarea{
        resize:none;
        min-height:110px;
        }

        button{
        background:#1d2671;
        color:white;
        border:none;
        padding:15px;
        border-radius:9px;
        font-size:17px;
        cursor:pointer;
        }

        table{
        width:100%;
        border-collapse:collapse;
        margin-top:35px;
        }

        th{
        background:#2f3640;
        color:white;
        padding:12px;
        }

        td{
        padding:10px;
        border:1px solid #ddd;
        text-align:center;
        }

        tr:nth-child(even){
        background:#f4f6f8;
        }

        .edit{
        background:#28a745;
        color:white;
        padding:6px 14px;
        border-radius:5px;
        text-decoration:none;
        font-size:13px;
        }

        .delete{
        background:#dc3545;
        color:white;
        padding:6px 14px;
        border-radius:5px;
        text-decoration:none;
        font-size:13px;
        }

        td.action-cell{
        display:flex;
        justify-content:center;
        gap:8px;
        }

        .field-error{
        color:red;
        font-size:13px;
        margin-top:3px;
        }

        footer{
        text-align:center;
        margin:25px 0;
        color:white;
        font-size:19px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Cauvery Polytechnic Gonikoppal</h1>
    <h3>Online Diploma Question Paper Download System</h3>
    <p>College Management</p>
</div>

<div class="card">

    <a href="/admin/dashboard" class="back-btn">← Back to Dashboard</a>

    <h2 th:text="${editMode} ? 'Edit College' : 'Add New College'"></h2>

    <!-- ERROR MESSAGE -->
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="${editMode} ? @{/admin/college/update} : @{/admin/college/save}"
          th:object="${college}"
          method="post"
          id="collegeForm">

        <div class="form-group">
            <label>College Code</label>
            <input type="text"
                   id="collegeCode"
                   th:field="*{collegeCode}"
                   th:readonly="${editMode}"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                   required>
            <div class="field-error" id="collegeCodeError"></div>
        </div>

        <div class="form-group">
            <label>College Name</label>
            <input type="text"
                   id="collegeName"
                   th:field="*{collegeName}"
                   oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')"
                   required>
            <div class="field-error" id="collegeNameError"></div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea th:field="*{address}" required></textarea>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text"
                   id="collegePhone"
                   th:field="*{phone}"
                   maxlength="10"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                   required>
            <div class="field-error" id="collegePhoneError"></div>
        </div>

        <button type="submit"
                th:text="${editMode} ? 'Update College' : 'Save College'">
        </button>

    </form>

    <h2 style="margin-top:35px;">College List</h2>

    <table>
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>

        <tr th:each="c : ${colleges}">
            <td th:text="${c.collegeCode}"></td>
            <td th:text="${c.collegeName}"></td>
            <td th:text="${c.address}"></td>
            <td th:text="${c.phone}"></td>

            <td class="action-cell">

                <a class="edit"
                   th:href="@{/admin/college/edit/{id}(id=${c.collegeCode})}">
                    Edit
                </a>

                <a class="delete"
                   th:href="@{/admin/college/delete/{id}(id=${c.collegeCode})}"
                   onclick="return confirm('Are you sure you want to delete this college?');">
                    Delete
                </a>

            </td>
        </tr>
    </table>

</div>

<footer>
    Developed And Designed By Jeevan V E, Arjun R, Vivek C R, Nithya N P, Krish K D | 2026
</footer>

<script>

    document.getElementById("collegeForm").addEventListener("submit", function(e){

    let valid = true;

    const code  = document.getElementById("collegeCode").value.trim();
    const name  = document.getElementById("collegeName").value.trim();
    const phone = document.getElementById("collegePhone").value.trim();

    document.getElementById("collegeCodeError").innerText = "";
    document.getElementById("collegeNameError").innerText = "";
    document.getElementById("collegePhoneError").innerText = "";

    if(!/^[0-9]+$/.test(code)){
    document.getElementById("collegeCodeError").innerText =
    "College code must contain numbers only";
    valid = false;
    }

    if(!/^[A-Za-z ]+$/.test(name)){
    document.getElementById("collegeNameError").innerText =
    "College name must contain letters only";
    valid = false;
    }

    if(!/^[0-9]{10}$/.test(phone)){
    document.getElementById("collegePhoneError").innerText =
    "Phone must be exactly 10 digits";
    valid = false;
    }

    if(!valid) e.preventDefault();
    });

</script>

</body>
</html>
