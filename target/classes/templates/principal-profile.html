<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Principal Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f1f5f9;
            display:flex;
        }

        .sidebar{
            width:270px;
            height:100vh;
            background:linear-gradient(180deg,#0f172a,#1e293b);
            padding-top:30px;
            position:fixed;
            left:0;
            top:0;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            font-size:20px;
            padding:18px 35px;
            margin:8px 15px;
            border-radius:10px;
        }

        .sidebar a.active{
            background:#ea580c;
        }

        .main{
            margin-left:270px;
            padding:40px;
            width:100%;
            display:flex;
            justify-content:center;
        }

        .card{
            width:500px;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
        }

        h1{
            font-size:26px;
            margin-bottom:25px;
            color:#0f172a;
        }

        label{
            font-size:14px;
            color:#475569;
            display:block;
            margin-bottom:6px;
            text-align:left;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border-radius:8px;
            border:1px solid #cbd5f5;
            font-size:14px;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
        }

        .btn{
            width:100%;
            background:#2563eb;
            color:white;
            border:none;
            padding:14px;
            border-radius:10px;
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .back-btn{
            display:block;
            margin-top:15px;
            padding:12px;
            background:#64748b;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-size:14px;
            transition:0.3s;
        }

        .back-btn:hover{
            background:#475569;
        }

        .note{
            margin-top:15px;
            font-size:13px;
            color:#64748b;
            text-align:center;
        }

        .success{
            text-align:center;
            color:green;
            margin-bottom:15px;
            font-size:14px;
        }

    </style>
</head>

<body>

<div class="sidebar">
    <a href="/principal/dashboard">🏠 Dashboard</a>
    <a href="/principal/instructions">📄 Exam Instructions</a>
    <a href="/principal/download">📥 Download Paper</a>
    <a href="/principal/profile" class="active">👤 Profile</a>
    <a href="/principal/logout">🚪 Logout</a>
</div>

<div class="main">

    <div class="card">

        <h1>Update Profile</h1>

        <div th:if="${param.success}" class="success">
            Profile Updated Successfully ✅
        </div>

        <form action="/principal/update-profile" method="post">

            <label>Principal Code</label>
            <input type="text"
                   th:value="${session.principal.principalCode}"
                   readonly>

            <label>Name</label>
            <input type="text"
                   name="principalName"
                   th:value="${session.principal.principalName}"
                   required
                   pattern="[A-Za-z ]+"
                   title="Name must contain only letters"
                   oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

            <label>Mobile</label>
            <input type="text"
                   name="mobile"
                   th:value="${session.principal.mobile}"
                   required
                   maxlength="10"
                   pattern="[0-9]{10}"
                   title="Mobile must be exactly 10 digits"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')">

            <button class="btn" type="submit">
                Save Changes
            </button>

        </form>

        <a href="/principal/dashboard" class="back-btn">
            ← Back to Dashboard
        </a>

        <div class="note">
            Password is managed by Admin
        </div>

    </div>

</div>

</body>
</html>
